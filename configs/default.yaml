# Default training configuration for coffee first crack detection
# Override any value via CLI flags or environment variables

model:
  base_model: "MIT/ast-finetuned-audioset-10-10-0.4593"
  num_labels: 2
  label2id:
    no_first_crack: 0
    first_crack: 1
  id2label:
    "0": "no_first_crack"
    "1": "first_crack"

audio:
  sample_rate: 16000
  target_length_sec: 10
  # ASTFeatureExtractor parameters (calibrated on AudioSet)
  feature_extractor_mean: -4.2677393
  feature_extractor_std: 4.5689974
  num_mel_bins: 128
  max_length: 1024

training:
  batch_size: 8
  learning_rate: 5.0e-5
  num_epochs: 20
  warmup_steps: 100
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  # Cropping mode: random (train) / center (eval)
  train_crop_mode: random
  eval_crop_mode: center
  use_class_weights: true
  early_stopping_patience: 5
  # HuggingFace Trainer settings
  evaluation_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: f1
  fp16: false   # set true for CUDA, false for MPS
  bf16: false   # set true for RTX 4090

dataloader:
  # MPS: num_workers=0, pin_memory=false
  # CUDA: num_workers=4, pin_memory=true
  num_workers: 0
  pin_memory: false

inference:
  window_size: 10.0      # seconds
  overlap: 0.7           # 70% → 3s hop
  threshold: 0.6
  min_pops: 5
  confirmation_window: 20.0  # seconds

# Raspberry Pi 5 inference profile — optimised for ~2s/window ONNX latency.
# Use via inference_onnx.py --profile pi_inference
pi_inference:
  window_size: 10.0      # seconds (matches training window)
  overlap: 0.5           # 50% → 5s hop — gives 2.9s thermal headroom per cycle
  threshold: 0.75        # higher than Mac (0.6) to reduce false positives
  min_pops: 3            # fewer windows per confirmation window at lower overlap
  confirmation_window: 30.0  # seconds — wider window to compensate for fewer windows/sec
  onnx_threads: 4        # requires adequate PSU + active cooling
  # Rationale:
  #   5s hop → inference uses 41% of cycle (2.07s/5s), leaving 59% idle
  #   ~6 windows in 30s window → need 3/6 positive (50%) for confirmation
  #   Worst-case detection delay: ~15s (3rd positive × 5s hop)
  #   First crack phase lasts 2-3 minutes so 15s delay is acceptable

export:
  output_dir: "exports/onnx"
  quantize_int8: true

paths:
  data_dir: "data"
  splits_dir: "data/splits"
  processed_dir: "data/processed"
  labels_dir: "data/labels"
  raw_dir: "data/raw"
  experiments_dir: "experiments"
  exports_dir: "exports"
